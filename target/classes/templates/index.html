<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quote Collector Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">

<div class="container bg-white p-4 shadow rounded">
    <h1 class="text-center text-primary mb-4">📝 Менеджер Цитат</h1>

    <div class="row mb-4">
        <div class="col-md-8">
            <form th:action="@{/add}" method="post" class="input-group">
                <input type="text" name="customText" class="form-control" placeholder="Напишіть власну цитату тут..." required>
                <button class="btn btn-primary" type="submit">Зберегти</button>
            </form>
        </div>
        <div class="col-md-4 text-end">
            <a href="/collect" class="btn btn-success w-100">📥 Парсити з мережі</a>
        </div>
    </div>

    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th style="width: 5%">ID</th>
                <th>Текст</th>
                <th style="width: 15%" class="text-center">Дія</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="q : ${quotes}">
                <td th:text="${q.id}"></td>
                <td th:text="${q.text}"></td>
                <td class="text-center">
                    <a th:href="@{/delete/{id}(id=${q.id})}" class="btn btn-sm btn-outline-danger">Видалити</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(quotes)}">
                <td colspan="3" class="text-center text-muted py-5">
                    База даних порожня. Додайте щось вручну або натисніть "Парсити".
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
